name: exact-engine-ci

on:
  push:
  pull_request:

jobs:
  linux-sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: address
            flags: -fsanitize=address
          - sanitizer: undefined
            flags: -fsanitize=undefined
          - sanitizer: thread
            flags: -fsanitize=thread
    env:
      SANITIZER_FLAGS: ${{ matrix.flags }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >-
          cmake -S boundary_ai -B build/ci-${{ matrix.sanitizer }}
          -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
          -DCMAKE_CXX_FLAGS="-O1 -g -fno-omit-frame-pointer ${SANITIZER_FLAGS}"
          -DCMAKE_EXE_LINKER_FLAGS="${SANITIZER_FLAGS}"
      - name: Build
        run: cmake --build build/ci-${{ matrix.sanitizer }} --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build/ci-${{ matrix.sanitizer }} --output-on-failure

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S boundary_ai -B build/ci-release -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build/ci-release --parallel 2
      - name: Test
        run: ctest --test-dir build/ci-release --output-on-failure

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Debug STL
        run: cmake -S boundary_ai -B build/ci-msvc -A x64 -DBUILD_TESTING=ON -DCMAKE_CXX_FLAGS="/D_ITERATOR_DEBUG_LEVEL=2"
      - name: Build and test
        run: |
          cmake --build build/ci-msvc --config Debug --parallel 2
          ctest --test-dir build/ci-msvc -C Debug --output-on-failure
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python regression dependency
        shell: pwsh
        run: python -m pip install --disable-pip-version-check --no-input numpy
      - name: Build native submission DLL
        shell: pwsh
        run: |
          msbuild "ptcg_engine/ptcgProgram 22/game.sln" /m:2 /p:Configuration=Release /p:Platform=x64
          Copy-Item "ptcg_engine/ptcgProgram 22/x64/Release/cg.dll" "sample_submission/sample_submission/cg/cg.dll" -Force
      - name: Run native regression tests against freshly built DLL
        shell: pwsh
        run: |
          python -m unittest sample_submission.tests.test_exact_native sample_submission.tests.test_worst_case_fixture
